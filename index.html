<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Gửi Chữ ESP32</title>
  <style>
    body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; text-align: center; }
    input { padding: 15px; font-size: 18px; width: 80%; border-radius: 8px; border: none; margin-bottom: 15px; }
    button { padding: 15px 30px; font-size: 18px; background: #0a84ff; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    #status { margin-top: 20px; font-size: 14px; color: #aaa; }
  </style>
</head>
<body>
  <h2>📡 Bảng Điều Khiển MotoMap</h2>
  
  <input type="text" id="msgBox" placeholder="Nhập chữ gì đó (vd: Hello Phong)">
  <br>
  <button onclick="sendText()">Gửi Lên Màn Hình OLED</button>
  
  <p id="status">Chưa gửi gì cả.</p>

  <script>
    // Tên trạm liên lạc (Cả Web và ESP32 phải dùng chung tên này)
    const THING_NAME = "motomap-test-phong-2026"; 

    async function sendText() {
  const text = document.getElementById('msgBox').value;
  if (!text) return;
  
  document.getElementById('status').innerText = "Đang bắn lên ThingSpeak...";
  
  // Link bắn dữ liệu lên ThingSpeak (Kênh test công cộng)
  // Field1 sẽ chứa nội dung tin nhắn của Phong
  const url = `https://api.thingspeak.com/update?api_key=
0RHTAM6URLWCFI28&field1=${encodeURIComponent(text)}`;
  
  try {
    await fetch(url, { mode: 'no-cors' }); // ThingSpeak chấp nhận chế độ này
    document.getElementById('status').innerText = "✅ Đã gửi xong! Đợi 2s để ESP32 cập nhật.";
  } catch (e) {
    document.getElementById('status').innerText = "❌ Vẫn lỗi mạng! (Kiểm tra lại 4G)";
  }
}
  </script>
</body>
</html>
